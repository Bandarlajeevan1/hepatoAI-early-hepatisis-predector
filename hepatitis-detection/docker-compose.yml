services:
  # Backend Flask API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hepatitis_backend
    environment:
      FLASK_APP: app.py
      FLASK_ENV: production
      MONGO_URI: mongodb+srv://jeevanbandarla1234_db_user:Jeevan12@cluster0.eg83ljt.mongodb.net/hepatitis_db?appName=Cluster0&retryWrites=true&w=majority
      FLASK_PORT: 5000
      LOG_LEVEL: INFO
      JWT_SECRET: your-secret-key-change-in-production-12345
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - ./backend/model:/app/model
    networks:
      - hepatitis_network
    healthcheck:
      test: curl --fail http://localhost:5000/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Frontend React App
  frontend:
    image: node:18-alpine
    container_name: hepatitis_frontend
    working_dir: /app
    environment:
      REACT_APP_API_URL: http://localhost:5000
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: >
      sh -c "npm install && npm start"
    depends_on:
      - backend
    networks:
      - hepatitis_network

networks:
  hepatitis_network:
    driver: bridge
